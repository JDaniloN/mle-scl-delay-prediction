# CD: build + push (tag = SHA) + Cloud Run rollout.
# Base infra is managed via Terraform (local or GCS backend); this workflow only pushes the image and updates the service.
name: Continuous Delivery

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Build, push, and update Cloud Run
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      APP_NAME: ${{ vars.APP_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify repository variables
        run: |
          test -n "${GCP_PROJECT_ID}" || { echo "::error::Missing GCP_PROJECT_ID in repository Actions variables"; exit 1; }
          test -n "${GCP_REGION}" || { echo "::error::Missing GCP_REGION (e.g. us-central1)"; exit 1; }
          test -n "${APP_NAME}" || { echo "::error::Missing APP_NAME (e.g. mlops-challenge-api)"; exit 1; }

      - name: Authenticate to Google Cloud (OIDC)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Docker login Artifact Registry
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Compute image URI
        run: |
          echo "IMAGE_URI=${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${APP_NAME}-repo/delay-api:${GITHUB_SHA}" >> "${GITHUB_ENV}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE_URI }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Cloud Run service with new image
        run: |
          gcloud run services update "${APP_NAME}" \
            --region="${GCP_REGION}" \
            --project="${GCP_PROJECT_ID}" \
            --image="${IMAGE_URI}" \
            --quiet
