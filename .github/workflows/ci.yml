# Continuous Integration — tests + validación de artefactos (MLOps: feedback rápido en cada PR).
name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-python:
    name: Tests (model + API)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-test.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-test.txt

      - name: Model tests
        run: |
          mkdir -p reports
          pytest --cov-config=.coveragerc --cov-report term --cov-report xml:reports/coverage-model.xml --junitxml=reports/junit-model.xml --cov=challenge tests/model -v

      - name: API tests
        run: |
          pytest --cov-config=.coveragerc --cov-report term --cov-report xml:reports/coverage-api.xml --junitxml=reports/junit-api.xml --cov=challenge tests/api -v

  validate-docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (sin push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: delay-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  validate-terraform:
    name: Terraform fmt + validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform fmt
        run: terraform fmt -check -recursive infra

      - name: Terraform init (sin backend remoto)
        working-directory: infra
        run: terraform init -backend=false -input=false

      - name: Terraform validate
        working-directory: infra
        run: terraform validate
